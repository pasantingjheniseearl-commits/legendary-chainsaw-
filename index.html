<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Pro Stock Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  background:#0f172a;
  color:white;
}

.sidebar {
  height:100vh;
  background:#020617;
  padding:20px;
}

.sidebar a {
  display:block;
  color:#94a3b8;
  padding:10px;
  text-decoration:none;
}

.sidebar a:hover {
  background:#1e293b;
  color:white;
}

.card {
  background:#020617;
  border:1px solid #1e293b;
}

.table {
  color:white;
}

.stat-card {
  padding:20px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-2 sidebar">
      <h4>📊 Admin</h4>
      <a href="#">Dashboard</a>
      <a href="#">Inventory</a>
      <a href="#">History</a>
      <a href="#">Reports</a>
    </div>

    <!-- MAIN -->
    <div class="col-md-10 p-4">

      <!-- TOP BAR -->
      <div class="d-flex justify-content-between mb-4">
        <h3>Stock Dashboard</h3>
        <button class="btn btn-danger" onclick="logout()">Logout</button>
      </div>

      <!-- STATS -->
      <div class="row mb-4">
        <div class="col-md-3">
          <div class="stat-card bg-primary">
            <h5>Total Items</h5>
            <h2 id="totalItems">0</h2>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card bg-success">
            <h5>Total Stock</h5>
            <h2 id="totalStock">0</h2>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card bg-warning">
            <h5>Low Stock</h5>
            <h2 id="lowStock">0</h2>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card bg-danger">
            <h5>Transactions</h5>
            <h2 id="totalTrans">0</h2>
          </div>
        </div>
      </div>

      <!-- ADD ITEM -->
      <div class="card p-3 mb-3">
        <h5>Add Item</h5>
        <div class="row">
          <div class="col"><input id="sku" class="form-control" placeholder="SKU"></div>
          <div class="col"><input id="desc" class="form-control" placeholder="Description"></div>
          <div class="col"><input id="qty" type="number" class="form-control" placeholder="Qty"></div>
          <div class="col"><input id="price" type="number" class="form-control" placeholder="Price"></div>
          <div class="col"><button class="btn btn-success w-100" onclick="addStock()">Add</button></div>
        </div>
      </div>

      <!-- TABLE -->
      <div class="card p-3 mb-3">
        <h5>Inventory</h5>
        <table class="table table-bordered">
          <thead>
            <tr>
              <th>SKU</th>
              <th>Description</th>
              <th>Qty</th>
              <th>Price</th>
            </tr>
          </thead>
          <tbody id="stockTable"></tbody>
        </table>
      </div>

      <!-- HISTORY -->
      <div class="card p-3">
        <h5>Transactions</h5>
        <table class="table table-bordered">
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>SKU</th>
              <th>Qty</th>
            </tr>
          </thead>
          <tbody id="historyTable"></tbody>
        </table>
      </div>

    </div>

  </div>
</div>

<script>
let stock = JSON.parse(localStorage.getItem("stock")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

function addStock(){
  let item = stock.find(x=>x.sku===sku.value);

  if(item){
    item.qty += Number(qty.value);
  } else {
    stock.push({
      sku: sku.value,
      desc: desc.value,
      qty: Number(qty.value),
      price: Number(price.value)
    });
  }

  history.push({
    date: new Date().toLocaleString(),
    type: "IN",
    sku: sku.value,
    qty: qty.value
  });

  save();
  load();
}

function save(){
  localStorage.setItem("stock", JSON.stringify(stock));
  localStorage.setItem("history", JSON.stringify(history));
}

function load(){
  stockTable.innerHTML="";
  historyTable.innerHTML="";

  let totalItems = stock.length;
  let totalQty = 0;
  let low = 0;

  stock.forEach(s=>{
    totalQty += s.qty;
    if(s.qty < 5) low++;

    stockTable.innerHTML += `
      <tr>
        <td>${s.sku}</td>
        <td>${s.desc}</td>
        <td>${s.qty}</td>
        <td>₱${s.price}</td>
      </tr>`;
  });

  history.slice().reverse().forEach(h=>{
    historyTable.innerHTML += `
      <tr>
        <td>${h.date}</td>
        <td>${h.type}</td>
        <td>${h.sku}</td>
        <td>${h.qty}</td>
      </tr>`;
  });

  totalItemsEl.innerText = totalItems;
  totalStockEl.innerText = totalQty;
  lowStockEl.innerText = low;
  totalTransEl.innerText = history.length;
}

const totalItemsEl = document.getElementById("totalItems");
const totalStockEl = document.getElementById("totalStock");
const lowStockEl = document.getElementById("lowStock");
const totalTransEl = document.getElementById("totalTrans");

function logout(){
  location.reload();
}

load();
</script>

</body>
</html>
