<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBNN2zC3CwtlErJS1TmLBEleA_9eNL-nKM",
    authDomain: "wmm-1603.firebaseapp.com",
    databaseURL: "https://wmm-1603-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "wmm-1603",
    storageBucket: "wmm-1603.firebasestorage.app",
    messagingSenderId: "950641290675",
    appId: "1:950641290675:web:10a17a68360b64e0b62fc6"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let stock = JSON.parse(localStorage.getItem("stock")) || [];
  let history = JSON.parse(localStorage.getItem("history")) || [];

  // REGISTER
  window.register = function() {
    const regUser = document.getElementById("regUser").value;
    const regPass = document.getElementById("regPass").value;
    if (!regUser || !regPass) return alert("Fill all fields");
    if (regPass.length < 6) return alert("Password must be at least 6 characters");

    createUserWithEmailAndPassword(auth, regUser, regPass)
      .then(() => {
        alert("Account created! Please login.");
        document.getElementById("loginUser").value = regUser;
        document.getElementById("loginPass").value = regPass;
        window.showLogin();
      })
      .catch(err => alert("Registration failed: " + err.message));
  };

  // LOGIN
  window.login = function() {
    const loginUser = document.getElementById("loginUser").value;
    const loginPass = document.getElementById("loginPass").value;
    if (!loginUser || !loginPass) return alert("Fill all fields");

    signInWithEmailAndPassword(auth, loginUser, loginPass)
      .then(() => {
        // Do NOT manually switch pages, onAuthStateChanged will handle it
      })
      .catch(err => alert("Login failed: " + err.message));
  };

  // LOGOUT
  window.logout = function() {
    signOut(auth).then(() => {
      stock = [];
      history = [];
      localStorage.clear();
      location.reload();
    });
  };

  window.showRegister = function() {
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("registerPage").classList.remove("hidden");
  };

  window.showLogin = function() {
    document.getElementById("registerPage").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
  };

  // STOCK
  window.addStock = async function() {
    const sku = document.getElementById("sku").value;
    const desc = document.getElementById("desc").value;
    const qty = Number(document.getElementById("qty").value);
    const price = Number(document.getElementById("price").value);
    if (!sku || !qty || qty <= 0 || !price) return alert("Fill all fields");

    try {
      await addDoc(collection(db, "stock"), {
        sku, desc, qty, price,
        date: new Date(),
        userId: auth.currentUser.uid
      });

      let item = stock.find(x => x.sku === sku);
      if (item) item.qty += qty;
      else stock.push({ sku, desc, qty, price });

      history.push({ date: new Date().toLocaleString(), type: "IN", sku, qty });

      document.getElementById("sku").value = "";
      document.getElementById("desc").value = "";
      document.getElementById("qty").value = "";
      document.getElementById("price").value = "";

      window.save();
      window.load();
    } catch (err) {
      alert(err.message);
    }
  };

  window.save = function() {
    localStorage.setItem("stock", JSON.stringify(stock));
    localStorage.setItem("history", JSON.stringify(history));
  };

  window.load = function() {
    let totalItems = stock.length;
    let totalQty = 0;
    let lowStock = 0;

    let stockHTML = "";
    stock.forEach(s => {
      totalQty += s.qty;
      if (s.qty < 5) lowStock++;
      stockHTML += `<tr>
        <td>${s.sku}</td>
        <td>${s.desc}</td>
        <td>${s.qty}</td>
        <td>₱${s.price}</td>
      </tr>`;
    });

    let historyHTML = "";
    history.slice().reverse().forEach(h => {
      historyHTML += `<tr>
        <td>${h.date}</td>
        <td>${h.type}</td>
        <td>${h.sku}</td>
        <td>${h.qty}</td>
      </tr>`;
    });

    document.getElementById("stockTable").innerHTML = stockHTML;
    document.getElementById("historyTable").innerHTML = historyHTML;
    document.getElementById("totalItems").innerText = totalItems;
    document.getElementById("totalStock").innerText = totalQty;
    document.getElementById("lowStock").innerText = lowStock;
    document.getElementById("totalTrans").innerText = history.length;
  };

  // AUTH STATE MONITOR
  onAuthStateChanged(auth, user => {
    if (user) {
      console.log("✅ User logged in:", user.email);
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("registerPage").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
      window.load();
    } else {
      console.log("❌ No user logged in");
      document.getElementById("dashboard").classList.add("hidden");
      document.getElementById("loginPage").classList.remove("hidden");
    }
  });
</script>
